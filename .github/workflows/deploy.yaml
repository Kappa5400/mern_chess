name: Master Deployment Pipeline
on:
  push:
    branches: [master]

jobs:
  backend-ci:
    uses: ./.github/workflows/backend-ci.yaml
    secrets: inherit

  frontend-ci:
    uses: ./.github/workflows/frontend-ci.yaml
    secrets: inherit

  deploy:
    needs: [backend-ci, frontend-ci]
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure and Deploy
        run: |

          cat <<EOF | sudo tee .env > /dev/null
          MONGO_URI=${{ secrets.MONGO_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          CLIENT_URL=https://chesspuzzlekappa54.me
          PORT=5000
          EOF

          sudo docker compose pull
          sudo docker compose up -d --remove-orphans

          sudo docker system prune -f

      - name: Verify Nginx
        run: |
          CONTAINER="mern_nginx"
          echo "Waiting for containers to stabilize..."
          for i in $(seq 1 12); do
            sleep 10
            STATUS=$(sudo docker inspect -f '{{.State.Status}}' $CONTAINER 2>/dev/null)
            if [ "$STATUS" = "running" ]; then
              echo "Container is running after ${i}0s"
              sudo docker exec $CONTAINER nginx -t && sudo docker exec $CONTAINER nginx -s reload
              exit 0
            fi
            echo "Status after ${i}0s: $STATUS"
          done
          echo "Deployment failed. $CONTAINER is not running."
          sudo docker logs $CONTAINER
          exit 1
